<!DOCTYPE html>
<html>
<head>
    <title>DAN STREAM OBS-PRO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b0e14; color: #00d2ff; font-family: sans-serif; text-align: center; padding: 0; margin: 0; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: cover; background: black; }
        .btn { background: #00d2ff; color: #000; border: none; padding: 15px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 10px; }
        #my-id { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 5px; font-size: 14px; z-index: 100; }
        #menu { padding-top: 50px; }
    </style>
</head>
<body>

    <div id="my-id">ID: Connecting...</div>
    
    <div id="menu">
        <h1>DAN STREAM</h1>
        <button class="btn" onclick="startSender()">START PHONE</button>
        <button class="btn" onclick="startReceiver()">START PC / OBS</button>
    </div>

    <video id="v" autoplay playsinline></video>

    <script>
        const peer = new Peer();
        let stream;

        peer.on('open', id => {
            document.getElementById('my-id').innerText = "ID: " + id;
            // AUTO-START RECEIVER FOR OBS
            if (window.navigator.userAgent.includes("OBS")) {
                startReceiver();
            }
        });

        async function startSender() {
            document.getElementById('menu').style.display = 'none';
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" }, width: 1920, height: 1080 },
                    audio: true
                });
                document.getElementById('v').srcObject = stream;
            } catch (e) {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('v').srcObject = stream;
            }
        }

        function startReceiver() {
            document.getElementById('menu').style.display = 'none';
            peer.on('call', call => {
                call.answer();
                call.on('stream', rs => {
                    document.getElementById('v').srcObject = rs;
                });
            });
        }

        // Connect function for phone
        function connect(targetId) {
            peer.call(targetId, stream);
        }
    </script>
</body>
</html>

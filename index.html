<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAN STREAM ULTRA PRO - BORDERLESS</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00d2ff; --bg: #000; --red: #ff4b2b; --orange: #ff9d00; }
        
        body { 
            background: var(--bg); 
            color: var(--neon); 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
        }

        /* Fullscreen Container Logic */
        .video-container { 
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            cursor: pointer;
        }

        video { 
            width: 100%; 
            height: 100%; 
            /* 'contain' shows full image; 'cover' fills screen by cropping edges */
            object-fit: contain; 
            background: #000; 
        }

        /* UI Overlay Elements */
        #ui-layer {
            position: relative;
            z-index: 10;
            pointer-events: none;
            padding: 20px;
        }
        
        #ui-layer button, #ui-layer .status-pill {
            pointer-events: auto;
        }

        /* "Streaming Mode" - Hides everything but the video */
        .streaming #ui-layer, .streaming h1, .streaming .log {
            display: none !important;
        }

        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn { 
            background: var(--neon); color: #000; border: none; padding: 12px 20px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; 
            text-transform: uppercase; min-width: 130px;
        }
        .btn-mute-on { background: var(--red) !important; color: white; }
        .btn-stop { background: #333; color: #ccc; }
        
        .status-pill { 
            display: inline-block; padding: 6px 15px; border-radius: 20px; 
            background: rgba(0,210,255,0.1); border: 1px solid var(--neon); 
            margin: 10px 0; font-family: monospace;
        }
        .log { font-size: 0.75rem; color: #555; position: fixed; bottom: 10px; width: 100%; }

        /* Mini indicator for when UI is hidden */
        #live-indicator {
            position: fixed; top: 10px; right: 10px; 
            color: red; font-weight: bold; font-size: 12px;
            z-index: 100; display: none;
        }
        .streaming #live-indicator { display: block; }
    </style>
</head>
<body>

    <div id="live-indicator">● LIVE</div>

    <div id="ui-layer">
        <h1>DAN STREAM <span style="color:white">ULTRA</span></h1>
        
        <div id="setup-menu">
            <button class="btn" onclick="initApp('receiver')">💻 PC (RECEIVER)</button>
            <button class="btn" onclick="initApp('sender')">📱 PHONE (CAMERA)</button>
        </div>

        <div id="main-app" style="display:none;">
            <div class="status-pill" id="status">INITIALIZING...</div>
            
            <div id="controls" class="btn-group">
                <button id="connect-btn" class="btn" style="display:none; background:#00ff00;" onclick="startCall()">🚀 GO LIVE</button>
                <button id="mute-btn" class="btn" style="display:none; background:#555;" onclick="toggleMute()">🎙️ MIC: ON</button>
                <button id="orient-btn" class="btn" style="display:none; background:var(--orange);" onclick="toggleOrientation()">📱 PORTRAIT</button>
                <button class="btn btn-stop" onclick="location.reload()">⏹️ RESET</button>
            </div>
        </div>
    </div>

    <!-- The actual video container -->
    <div id="v-container" class="video-container" ondblclick="toggleFullscreen()">
        <video id="v" autoplay playsinline muted></video>
    </div>

    <div class="log" id="debug-log">System Log: Ready</div>

    <script>
        let peer;
        let localStream;
        let isMuted = false;
        let isPortrait = false;
        let currentCall = null;
        const TARGET_ID = "dan-ultra-2026-secure";

        function log(msg) {
            document.getElementById('debug-log').innerText = "Log: " + msg;
        }

        async function initApp(role) {
            document.getElementById('setup-menu').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            peer = (role === 'receiver') ? new Peer(TARGET_ID) : new Peer();

            peer.on('open', id => {
                log("Peer ID: " + id);
                if(role === 'receiver') {
                    document.getElementById('status').innerText = "WAITING FOR PHONE...";
                } else {
                    document.getElementById('status').innerText = "PHONE READY";
                    document.getElementById('connect-btn').style.display = 'inline-block';
                    document.getElementById('mute-btn').style.display = 'inline-block';
                    document.getElementById('orient-btn').style.display = 'inline-block';
                    setupCamera();
                }
            });

            // PC Receiver Logic
            peer.on('call', call => {
                log("Receiving stream...");
                call.answer();
                call.on('stream', remoteStream => {
                    const video = document.getElementById('v');
                    video.srcObject = remoteStream;
                    video.muted = false;
                    video.play();
                    
                    // Automatically enter "Streaming Mode" (hides UI)
                    document.body.classList.add('streaming');
                    document.getElementById('status').innerText = "🔴 LIVE CONNECTION ACTIVE";
                });
            });
        }

        async function setupCamera() {
            const constraints = {
                video: { 
                    facingMode: "environment",
                    width: isPortrait ? { ideal: 720 } : { ideal: 1280 },
                    height: isPortrait ? { ideal: 1280 } : { ideal: 720 }
                },
                audio: true
            };

            try {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('v').srcObject = localStream;
                localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
                
                if (currentCall) startCall(); 
            } catch (e) {
                log("Camera Error: " + e.message);
            }
        }

        function toggleFullscreen() {
            const container = document.getElementById('v-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    log(`Error: ${err.message}`);
                });
                document.body.classList.add('streaming');
            } else {
                document.exitFullscreen();
                document.body.classList.remove('streaming');
            }
        }

        function toggleOrientation() {
            isPortrait = !isPortrait;
            const btn = document.getElementById('orient-btn');
            btn.innerText = isPortrait ? "📺 LANDSCAPE" : "📱 PORTRAIT";
            setupCamera();
        }

        function toggleMute() {
            isMuted = !isMuted;
            if (localStream) {
                localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            }
            const btn = document.getElementById('mute-btn');
            btn.innerText = isMuted ? "🔇 MIC: OFF" : "🎙️ MIC: ON";
            btn.className = isMuted ? "btn btn-mute-on" : "btn";
        }

        function startCall() {
            if (!localStream) return alert("Wait for camera!");
            log("Connecting to PC...");
            currentCall = peer.call(TARGET_ID, localStream);
            document.getElementById('status').innerText = "LINKED TO PC";
            // Optional: Hide phone UI once call starts
            // document.body.classList.add('streaming'); 
        }

        // Listen for fullscreen changes (like pressing ESC) to show UI again
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.body.classList.remove('streaming');
            }
        });
    </script>
</body>
</html>

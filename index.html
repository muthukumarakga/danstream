<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAN STREAM ULTRA - REDMI EDITION</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00d2ff; --bg: #0b1118; --red: #ff4b2b; }
        body { background: var(--bg); color: var(--neon); font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .video-container { 
            position: relative; width: 100%; max-width: 900px; margin: 10px auto; 
            border-radius: 12px; overflow: hidden; border: 2px solid var(--neon); 
            background: #000; aspect-ratio: 16/9; transition: 0.3s;
        }
        .portrait { aspect-ratio: 9/16; max-width: 400px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .btn { 
            background: var(--neon); color: #000; border: none; padding: 15px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; min-width: 120px;
        }
        .btn-mute { background: #555; color: white; }
        .btn-active { background: var(--red) !important; }
        .status { padding: 10px; margin-bottom: 10px; border: 1px solid #333; border-radius: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="setup-menu">
        <h2>SELECT ROLE</h2>
        <button class="btn" onclick="initApp('receiver')">💻 OBS PC (RECEIVER)</button>
        <button class="btn" onclick="initApp('sender')">📱 REDMI (SENDER)</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="status" id="status">INITIALIZING...</div>
        
        <div id="v-container" class="video-container">
            <video id="v" autoplay playsinline muted></video>
        </div>

        <div id="controls" class="btn-group" style="display:none;">
            <button id="connect-btn" class="btn" style="background:#00ff00;" onclick="startCall()">🚀 GO LIVE</button>
            <button id="mute-btn" class="btn btn-mute" onclick="toggleMute()">🎙️ MIC: ON</button>
            <button id="orient-btn" class="btn" style="background:#ff9d00;" onclick="toggleOrientation()">📱 PORTRAIT</button>
            <button class="btn" style="background:#333; color:white;" onclick="location.reload()">⏹️ RESET</button>
        </div>
    </div>

    <script>
        let peer;
        let localStream;
        let isMuted = false;
        let isPortrait = false;
        const TARGET_ID = "dan-ultra-redmi-2026"; 

        async function initApp(role) {
            document.getElementById('setup-menu').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            // Redmi works better with no custom ID on the sender side
            peer = (role === 'receiver') ? new Peer(TARGET_ID) : new Peer();

            peer.on('open', id => {
                document.getElementById('status').innerText = (role === 'receiver') ? "PC READY - OPEN ON PHONE" : "REDMI READY";
                if(role === 'sender') {
                    document.getElementById('controls').style.display = 'flex';
                    setupRedmiCamera();
                }
            });

            peer.on('call', call => {
                call.answer();
                call.on('stream', remote => {
                    const video = document.getElementById('v');
                    video.srcObject = remote;
                    video.muted = false;
                    video.play();
                    document.getElementById('status').innerText = "🔴 LIVE IN OBS";
                });
            });
        }

        async function setupRedmiCamera() {
            // REDMI SPECIFIC: We define a range rather than "exact" to prevent driver crashes
            const constraints = {
                video: {
                    facingMode: "environment",
                    width: isPortrait ? { min: 480, ideal: 720 } : { min: 640, ideal: 1280 },
                    height: isPortrait ? { min: 640, ideal: 1280 } : { min: 480, ideal: 720 },
                    frameRate: { ideal: 30 }
                },
                audio: true
            };

            try {
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                
                // Request stream
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                const v = document.getElementById('v');
                v.srcObject = localStream;
                
                // REDMI FORCE PLAY: MIUI often pauses video without this
                v.load();
                await v.play();
                
                document.getElementById('status').innerText = "CAMERA ACTIVE";
            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = "ERROR: Try Chrome Browser";
            }
        }

        function startCall() {
            document.getElementById('status').innerText = "LINKING...";
            const call = peer.call(TARGET_ID, localStream);
            call.on('error', e => alert("PC not found! Check if PC is open first."));
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            const btn = document.getElementById('mute-btn');
            btn.innerText = isMuted ? "🔇 MIC: OFF" : "🎙️ MIC: ON";
            btn.classList.toggle('btn-active', isMuted);
        }

        function toggleOrientation() {
            isPortrait = !isPortrait;
            document.getElementById('v-container').classList.toggle('portrait', isPortrait);
            document.getElementById('orient-btn').innerText = isPortrait ? "📺 LANDSCAPE" : "📱 PORTRAIT";
            setupRedmiCamera(); // Refresh camera for new aspect ratio
        }
    </script>
</body>
</html>

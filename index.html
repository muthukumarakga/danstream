<!DOCTYPE html>
<html>
<head>
    <title>DAN STREAM MAIN-CAM</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b0e14; color: #00d2ff; font-family: sans-serif; text-align: center; padding: 20px; }
        video { width: 90%; max-width: 600px; border: 4px solid #00d2ff; border-radius: 15px; background: black; }
        .btn { background: #00d2ff; color: #000; border: none; padding: 15px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 10px; font-size: 1.1rem; }
        .btn-stop { background: #ff4b2b; color: white; }
        .btn-mute { background: #ffb703; }
        #my-id { font-weight: bold; color: #fff; background: #222; padding: 10px; border-radius: 5px; display: inline-block; margin: 10px; }
    </style>
</head>
<body>
    <h1>DAN STREAM PRO</h1>
    
    <div id="menu">
        <button class="btn" onclick="startSender()">START PHONE (MAIN CAM)</button>
        <button class="btn" onclick="startReceiver()">START PC (RECEIVER)</button>
    </div>

    <div id="display" style="display:none;">
        <p>STATION ID: <span id="my-id">...</span></p><br>
        <video id="v" autoplay playsinline></video>
        
        <div id="controls" style="margin-top:20px;">
            <button class="btn" id="mBtn" onclick="toggleMute()">🎤 Mute</button>
            <button class="btn btn-stop" onclick="stopAll()">⏹️ Stop</button>
        </div>

        <div id="conn-ui" style="display:none; margin-top: 20px;">
            <input type="text" id="pcID" placeholder="Enter PC ID" style="padding:12px; border-radius:8px; width: 200px;">
            <button class="btn" onclick="connect()">LINK TO PC</button>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let stream;

        peer.on('open', id => document.getElementById('my-id').innerText = id);

        async function startSender() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('display').style.display = 'block';
            document.getElementById('conn-ui').style.display = 'block';
            
            const constraints = {
                video: {
                    facingMode: { ideal: "environment" },
                    // Force a higher resolution to skip the Macro lens
                    width: { min: 1280, ideal: 1920 },
                    height: { min: 720, ideal: 1080 }
                },
                audio: true
            };

            try {
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('v').srcObject = stream;
            } catch (err) {
                console.error("Main camera failed, trying basic back camera", err);
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: true });
                document.getElementById('v').srcObject = stream;
            }
        }

        function startReceiver() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('display').style.display = 'block';
            document.getElementById('controls').style.display = 'none';
            peer.on('call', call => {
                call.answer();
                call.on('stream', rs => document.getElementById('v').srcObject = rs);
            });
        }

        function connect() {
            const id = document.getElementById('pcID').value.trim();
            if(!id) return alert("Enter PC ID!");
            peer.call(id, stream);
            alert("Linking to PC...");
        }

        function toggleMute() {
            const audio = stream.getAudioTracks()[0];
            audio.enabled = !audio.enabled;
            const btn = document.getElementById('mBtn');
            btn.innerText = audio.enabled ? "🎤 Mute" : "🔇 Muted";
            btn.classList.toggle('btn-mute', !audio.enabled);
        }

        function stopAll() {
            location.reload();
        }
    </script>
</body>
</html>

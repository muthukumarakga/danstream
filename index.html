<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAN STREAM ULTRA - PRO EDITION</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00d2ff; --bg: #0b1118; --red: #ff4b2b; --orange: #ff9d00; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; overflow: hidden; }
        
        .status-pill { 
            display: inline-block; padding: 8px 15px; border-radius: 20px; 
            background: rgba(0,210,255,0.1); border: 2px solid var(--neon); 
            margin: 10px 0; font-family: monospace; font-weight: bold;
        }

        .video-container { 
            position: relative; width: 95vw; max-width: 900px; margin: 0 auto; 
            border-radius: 12px; overflow: hidden; border: 2px solid var(--neon); 
            background: #000; aspect-ratio: 16/9; display: flex; align-items: center;
        }
        .portrait { aspect-ratio: 9/16; max-width: 400px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn { 
            background: var(--neon); color: #000; border: none; padding: 15px 20px; 
            border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase;
            min-width: 120px; box-shadow: 0 4px #008fb3;
        }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn-mute-on { background: var(--red) !important; color: white; box-shadow: 0 4px #b32400; }
        
        .debug { font-size: 0.7rem; color: #444; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

    <div id="setup-menu">
        <h2 style="color:white">DAN STREAM PRO</h2>
        <p>Choose Device Role:</p>
        <button class="btn" onclick="initApp('receiver')">💻 OBS PC (RECEIVER)</button>
        <br><br>
        <button class="btn" style="background:var(--orange); box-shadow: 0 4px #b36b00;" onclick="initApp('sender')">📱 REDMI (SENDER)</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="status-pill" id="status">INITIALIZING...</div>
        
        <div id="v-container" class="video-container">
            <video id="v" autoplay playsinline muted></video>
        </div>

        <div id="controls" class="btn-group">
            <button id="connect-btn" class="btn" style="display:none; background:#00ff00; box-shadow:0 4px #009900;" onclick="startCall()">🚀 GO LIVE</button>
            <button id="mute-btn" class="btn" style="display:none; background:#555; color:white; box-shadow:0 4px #333;" onclick="toggleMute()">🎙️ MIC: ON</button>
            <button id="orient-btn" class="btn" style="display:none; background:var(--orange); box-shadow: 0 4px #b36b00;" onclick="toggleOrientation()">📱 PORTRAIT</button>
            <button class="btn" style="background:#333; color:white; box-shadow: 0 4px #111;" onclick="location.reload()">⏹️ RESET</button>
        </div>
        <div class="debug" id="debug-log">System Log: Ready</div>
    </div>

    <script>
        let peer;
        let localStream;
        let isMuted = false;
        let isPortrait = false;
        // CONSTANT ID FOR RECEIVER
        const TARGET_ID = "dan-stream-2026-v1"; 

        function log(msg) {
            console.log(msg);
            document.getElementById('debug-log').innerText = "LOG: " + msg;
        }

        async function initApp(role) {
            document.getElementById('setup-menu').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            // PC needs a fixed ID. Phone gets a random ID.
            peer = (role === 'receiver') ? new Peer(TARGET_ID) : new Peer();

            peer.on('open', id => {
                log("My ID: " + id);
                if(role === 'receiver') {
                    document.getElementById('status').innerText = "PC READY: WAITING FOR PHONE";
                } else {
                    document.getElementById('status').innerText = "REDMI READY";
                    document.getElementById('connect-btn').style.display = 'inline-block';
                    document.getElementById('mute-btn').style.display = 'inline-block';
                    document.getElementById('orient-btn').style.display = 'inline-block';
                    setupRedmiCamera();
                }
            });

            // RECEIVER LOGIC
            peer.on('call', call => {
                log("Incoming stream detected...");
                call.answer(); 
                call.on('stream', remoteStream => {
                    const video = document.getElementById('v');
                    video.srcObject = remoteStream;
                    video.muted = false; // Allow audio on PC
                    video.play().catch(e => log("Click inside OBS to play audio!"));
                    document.getElementById('status').innerText = "🔴 LIVE IN OBS";
                    document.getElementById('status').style.borderColor = "red";
                });
            });

            peer.on('error', err => {
                log("Error: " + err.type);
                if(err.type === 'peer-unavailable') {
                    alert("PC not found! Make sure the PC page is open.");
                }
            });
        }

        async function setupRedmiCamera() {
            const constraints = {
                video: { 
                    facingMode: "environment",
                    width: isPortrait ? { ideal: 720 } : { ideal: 1280 },
                    height: isPortrait ? { ideal: 1280 } : { ideal: 720 }
                },
                audio: true
            };

            try {
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                const v = document.getElementById('v');
                v.srcObject = localStream;
                v.play();
                
                log("Redmi Camera Active");
            } catch (e) {
                log("Camera Error: " + e.message);
                alert("Please use Chrome and allow Camera permissions.");
            }
        }

        function startCall() {
            if (!localStream) return alert("Camera not ready!");
            log("Linking...");
            const call = peer.call(TARGET_ID, localStream);
            document.getElementById('status').innerText = "LINKING TO PC...";
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            const btn = document.getElementById('mute-btn');
            btn.innerText = isMuted ? "🔇 MIC: OFF" : "🎙️ MIC: ON";
            btn.className = isMuted ? "btn btn-mute-on" : "btn";
        }

        function toggleOrientation() {
            isPortrait = !isPortrait;
            const container = document.getElementById('v-container');
            container.classList.toggle('portrait', isPortrait);
            document.getElementById('orient-btn').innerText = isPortrait ? "📺 LANDSCAPE" : "📱 PORTRAIT";
            setupRedmiCamera();
        }
    </script>
</body>
</html>

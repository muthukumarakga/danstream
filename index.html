<!DOCTYPE html>
<html>
<head>
    <title>DAN STREAM NINJA</title>
    <style>
        body { background: #0b0e14; color: #00d2ff; font-family: sans-serif; text-align: center; padding: 20px; }
        iframe { width: 95%; height: 500px; border: 4px solid #00d2ff; border-radius: 15px; background: black; display: none; }
        .btn { background: #00d2ff; color: #000; border: none; padding: 20px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 10px; font-size: 1.2rem; }
        .setup-box { background: #161b22; padding: 20px; border-radius: 15px; display: inline-block; }
        input { padding: 10px; border-radius: 5px; border: none; width: 200px; font-size: 1rem; text-align: center; }
    </style>
</head>
<body>
    <h1>DAN STREAM NINJA</h1>

    <div id="setup" class="setup-box">
        <p>Enter a Secret Room Name (e.g., DanStream77)</p>
        <input type="text" id="roomName" placeholder="Room Name">
        <br><br>
        <button class="btn" onclick="startNinja('sender')">I AM ON PHONE</button>
        <button class="btn" style="background:#ffb703;" onclick="startNinja('receiver')">I AM ON PC/OBS</button>
    </div>

    <iframe id="ninjaFrame" allow="camera;microphone;fullscreen;display-capture;autoplay"></iframe>

    <script>
        function startNinja(mode) {
            const room = document.getElementById('roomName').value.trim();
            if (!room) {
                alert("Please enter a room name first!");
                return;
            }

            const frame = document.getElementById('ninjaFrame');
            const setup = document.getElementById('setup');
            
            setup.style.display = 'none';
            frame.style.display = 'block';

            if (mode === 'sender') {
                // Forces back camera, high quality, and auto-starts
                frame.src = `https://vdo.ninja/?push=${room}&cleanviewer&autostart&facing=back&quality=0`;
            } else {
                // Receiver mode for PC/OBS
                frame.src = `https://vdo.ninja/?view=${room}&cleanviewer&autostart`;
            }
        }
    </script>
</body>
</html>

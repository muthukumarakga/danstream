<!DOCTYPE html>
<html>
<head>
    <title>DAN STREAM</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b0e14; color: #00d2ff; font-family: 'Arial', sans-serif; text-align: center; padding: 20px; }
        .video-box { width: 90%; max-width: 640px; border: 4px solid #00d2ff; border-radius: 20px; box-shadow: 0 0 20px #00d2ff; background: black; }
        .btn { background: #00d2ff; color: #0b0e14; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 10px; font-size: 1.1rem; }
        #my-id { font-size: 1.5rem; color: #fff; background: #222; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>DAN STREAM PRO</h1>
    
    <div id="start-screen">
        <button class="btn" onclick="initSender()">I AM ON PHONE (SENDER)</button>
        <button class="btn" onclick="initReceiver()">I AM ON PC (RECEIVER)</button>
    </div>

    <div id="main-app" style="display:none;">
        <p>STATION ID: <span id="my-id">...</span></p>
        <video id="view" class="video-box" autoplay playsinline></video>
        
        <div id="sender-ui" style="display:none; margin-top:20px;">
            <input type="text" id="target-id" placeholder="Enter PC ID" style="padding:10px; border-radius:5px;">
            <button class="btn" onclick="connectToPC()">LINK TO PC</button>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let localStream;

        peer.on('open', id => { document.getElementById('my-id').innerText = id; });

        // PHONE MODE
        async function initSender() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('sender-ui').style.display = 'block';
            localStream = await navigator.mediaDevices.getUserMedia({video: {width: 1280, height: 720}, audio: true});
            document.getElementById('view').srcObject = localStream;
        }

        function connectToPC() {
            const pcID = document.getElementById('target-id').value;
            peer.call(pcID, localStream);
            alert("Linking to Dan's PC...");
        }

        // PC MODE
        function initReceiver() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            peer.on('call', call => {
                call.answer();
                call.on('stream', remoteStream => {
                    document.getElementById('view').srcObject = remoteStream;
                });
            });
        }
    </script>
</body>
</html>

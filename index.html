<!DOCTYPE html>
<html>
<head>
    <title>DAN STREAM PRO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b0e14; color: #00d2ff; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        .video-box { width: 100%; max-width: 640px; border: 4px solid #00d2ff; border-radius: 15px; background: black; margin-top: 10px; }
        .btn { background: #00d2ff; color: #000; border: none; padding: 15px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 10px; font-size: 1.1rem; }
        .btn-stop { background: #ff4b2b; color: white; }
        .status-pill { display: inline-block; padding: 8px 20px; border-radius: 20px; background: #222; font-size: 1rem; margin-bottom: 10px; border: 1px solid #444; }
    </style>
</head>
<body>
    <h1>DAN STREAM PRO</h1>
    
    <div id="menu">
        <button class="btn" onclick="initApp('sender')">PHONE (SENDER)</button>
        <button class="btn" onclick="initApp('receiver')">PC (RECEIVER)</button>
    </div>

    <div id="app" style="display:none;">
        <div class="status-pill" id="status">Connecting...</div><br>
        <video id="v" class="video-box" autoplay playsinline muted></video>
        
        <div id="sender-controls" style="display:none; margin-top:20px;">
            <button class="btn" style="background:#00ff00;" onclick="connectToPC()">🚀 LINK TO PC</button>
            <br>
            <button id="mute-btn" class="btn" onclick="toggleMute()">🎤 MIC ON</button>
            <button class="btn btn-stop" onclick="location.reload()">⏹️ RESET</button>
        </div>
    </div>

    <script>
        let peer;
        let localStream;
        const FIXED_ID = "dan1982"; 

        async function initApp(mode) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            if (mode === 'receiver') {
                // PC Setup with automatic cleanup
                if (peer) peer.destroy();
                
                peer = new Peer(FIXED_ID, {
                    config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
                });
                
                peer.on('open', id => {
                    document.getElementById('status').innerText = "PC READY: Waiting for Phone...";
                    document.getElementById('status').style.color = "lime";
                });

                peer.on('call', call => {
                    call.answer();
                    call.on('stream', remoteStream => {
                        const vid = document.getElementById('v');
                        vid.srcObject = remoteStream;
                        vid.muted = false;
                        document.getElementById('status').innerText = "LIVE: Connected";
                    });
                });

                peer.on('error', err => {
                    console.log("Error type:", err.type);
                    if (err.type === 'unavailable-id') {
                        document.getElementById('status').innerText = "ID Busy. Retrying in 3s...";
                        setTimeout(() => location.reload(), 3000);
                    } else {
                        document.getElementById('status').innerText = "Network Error. Please Refresh.";
                    }
                });

            } else {
                // Phone Setup
                peer = new Peer(); 
                document.getElementById('sender-controls').style.display = 'block';
                document.getElementById('status').innerText = "PHONE READY";

                try {
                    localStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { ideal: "environment" }, width: 1280, height: 720 },
                        audio: true
                    });
                    document.getElementById('v').srcObject = localStream;
                } catch (e) {
                    alert("Camera error. Please allow permissions.");
                }
            }
        }

        function connectToPC() {
            if (!localStream) return alert("Camera not ready!");
            document.getElementById('status').innerText = "Linking to dan1982...";
            peer.call(FIXED_ID, localStream);
        }

        function toggleMute() {
            const audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            const btn = document.getElementById('mute-btn');
            btn.innerText = audioTrack.enabled ? "🎤 MIC ON" : "🔇 MIC OFF";
            btn.style.background = audioTrack.enabled ? "#00d2ff" : "#ffb703";
        }
    </script>
</body>
</html>

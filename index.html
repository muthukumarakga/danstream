<!DOCTYPE html>
<html>
<head>
    <title>DAN STREAM - RECOVERY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #0b0e14; color: #00d2ff; font-family: sans-serif; text-align: center; padding: 20px; }
        .video-box { width: 90%; max-width: 600px; border: 4px solid #00d2ff; border-radius: 15px; background: black; }
        .btn { background: #00d2ff; color: #000; border: none; padding: 15px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 10px; font-size: 1rem; }
        #my-id { font-size: 1.2rem; color: #fff; background: #222; padding: 10px; border-radius: 5px; border: 1px solid #00d2ff; display: inline-block; }
        .status { color: #ffb703; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>DAN STREAM PRO</h1>
    
    <div class="status" id="status-msg">Searching for Server...</div>
    <div id="my-id">Waiting for ID...</div>
    <br>
    <button class="btn" style="background:#444; color:white; font-size:0.8rem;" onclick="location.reload()">RELOAD APP</button>

    <div id="menu" style="margin-top:20px;">
        <button class="btn" onclick="startSender()">SENDER (PHONE)</button>
        <button class="btn" onclick="startReceiver()">RECEIVER (PC/OBS)</button>
    </div>

    <div id="display" style="display:none; margin-top:20px;">
        <video id="v" class="video-box" autoplay playsinline></video>
        <div id="sender-ui" style="display:none; margin-top:20px;">
            <input type="text" id="target-id" placeholder="Enter PC ID" style="padding:12px; border-radius:8px; width: 180px;">
            <button class="btn" onclick="linkUp()">LINK TO PC</button>
        </div>
    </div>

    <script>
        // Start Peer with a slight delay to ensure network is ready
        let peer = new Peer();
        let localStream;

        function updateStatus(msg, color = "#ffb703") {
            const el = document.getElementById('status-msg');
            el.innerText = msg;
            el.style.color = color;
        }

        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
            updateStatus("ONLINE - READY TO LINK", "#00ff00");
        });

        peer.on('error', err => {
            console.error(err);
            updateStatus("Error: " + err.type, "#ff4b2b");
            if(err.type === 'server-error') {
                updateStatus("PeerServer Busy. Retrying...", "#ffb703");
                setTimeout(() => location.reload(), 3000);
            }
        });

        async function startSender() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('display').style.display = 'block';
            document.getElementById('sender-ui').style.display = 'block';
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" }, width: 1280, height: 720 },
                    audio: true
                });
                document.getElementById('v').srcObject = localStream;
            } catch (e) {
                alert("Camera access denied or not found.");
            }
        }

        function startReceiver() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('display').style.display = 'block';
            peer.on('call', call => {
                call.answer();
                call.on('stream', rs => {
                    document.getElementById('v').srcObject = rs;
                });
            });
        }

        function linkUp() {
            const tId = document.getElementById('target-id').value.trim();
            if(!tId) return alert("Enter the ID from your laptop!");
            peer.call(tId, localStream);
            updateStatus("STREAMING TO PC...", "#00d2ff");
        }
    </script>
</body>
</html>

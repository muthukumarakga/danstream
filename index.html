<!DOCTYPE html>
<html>
<head>
    <title>DAN CAMERA TEST</title>
    <style>
        body { background: black; color: white; text-align: center; font-family: sans-serif; }
        video { width: 90%; border: 5px solid red; border-radius: 20px; margin-top: 20px; }
        .msg { font-size: 1.2rem; color: yellow; margin: 20px; }
    </style>
</head>
<body>
    <h1>CAMERA TEST</h1>
    <div id="status" class="msg">Requesting Camera...</div>
    <video id="testVideo" autoplay playsinline></video>

    <script>
        async function startTest() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                document.getElementById('testVideo').srcObject = stream;
                document.getElementById('status').innerText = "SUCCESS! Camera is working.";
                document.getElementById('status').style.color = "lime";
            } catch (err) {
                document.getElementById('status').innerText = "ERROR: " + err.name;
                console.error(err);
            }
        }
        startTest();
    </script>
</body>
</html>
